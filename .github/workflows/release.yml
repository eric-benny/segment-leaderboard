name: Release Chrome Extension

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: get_version
        run: |
          CURRENT_VERSION=$(jq -r '.version' src/manifest.json)
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Increment patch version
        id: bump_version
        run: |
          VERSION=${{ steps.get_version.outputs.current_version }}
          IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
          MAJOR=${VERSION_PARTS[0]}
          MINOR=${VERSION_PARTS[1]}
          PATCH=${VERSION_PARTS[2]}
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version: $NEW_VERSION"

      - name: Update manifest.json version
        run: |
          jq '.version = "${{ steps.bump_version.outputs.new_version }}"' src/manifest.json > src/manifest.json.tmp
          mv src/manifest.json.tmp src/manifest.json
          cat src/manifest.json

      - name: Create distribution zip
        run: |
          cd src
          zip -r ../strava-segment-leaderboard-v${{ steps.bump_version.outputs.new_version }}.zip .
          cd ..
          echo "Created: strava-segment-leaderboard-v${{ steps.bump_version.outputs.new_version }}.zip"
          unzip -l strava-segment-leaderboard-v${{ steps.bump_version.outputs.new_version }}.zip

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/manifest.json
          git commit -m "chore: bump version to v${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: v${{ steps.bump_version.outputs.new_version }}
          name: v${{ steps.bump_version.outputs.new_version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: strava-segment-leaderboard-v${{ steps.bump_version.outputs.new_version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
